name: Stock Market Daily
on:
  schedule:
    # UTC 23:00/23:30/00:00 = JST 8:00/8:30/9:00
    - cron: '0 23 * * *'
    - cron: '30 23 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install google-genai
      - name: Setup git
        run: |
          git config user.name "Stock Market Bot"
          git config user.email "bot@example.com"
      - name: Generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_digest.py
      - name: Push
        run: |
          git add latest.html *.html *.md history.json || true
          git diff --cached --quiet || git commit -m "update $(date -u +%Y.%m.%d)"
          git push
