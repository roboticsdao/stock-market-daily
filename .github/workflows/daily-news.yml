name: Stock Market Daily
on:
  schedule:
    # UTC 23:00 = JST 8:00, for Japan market morning news.
    - cron: '0 23 * * *'
    # US market morning checks. During US daylight time:
    # UTC 12:00/13:15/14:00 = ET 8:00/9:15/10:00 = JST 21:00/22:15/23:00.
    # During US standard time, these run one hour earlier in ET.
    - cron: '0 12 * * *'
    - cron: '15 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:  # 手动触发
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install google-genai
      - name: Setup git
        run: |
          git config user.name "Stock Market Bot"
          git config user.email "bot@example.com"
      - name: Generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_digest.py
      - name: Push
        run: |
          git add latest.html *.html *.md history.json || true
          git diff --cached --quiet || git commit -m "update $(date -u +%Y.%m.%d)"
          git push
